services:
  # --------------------------------------------------
  # Backend API Web Service
  # --------------------------------------------------
  - type: web
    name: devlens-github-analytics-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: GITHUB_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        # Set this to your Render static site URL after deploying the frontend
        # e.g. https://devlens-github-analytics-app.onrender.com
        sync: false

  # --------------------------------------------------
  # Frontend Web App Static Site
  # --------------------------------------------------
  - type: static
    name: devlens-github-analytics-app
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      # Rewrite rule to handle SPA routing (page refreshes will not 404)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Must include /api suffix — Vite bakes this into the JS bundle at build time
        value: https://devlens-github-analytics-api.onrender.com/api
